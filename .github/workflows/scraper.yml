name: Nightly scraper

on:
  schedule:
    - cron: "0 2 */2 * *"   # every 2 days at 02:00 UTC (04:00 Israel time)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90       # 1.5h per city — plenty of headroom

    strategy:
      fail-fast: false        # if one city fails, others keep running
      matrix:
        city: [tel_aviv, jerusalem, haifa, beer_sheva]

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Scrape ${{ matrix.city }}
        run: xvfb-run --auto-servernum python scraper/run.py --playwright --city ${{ matrix.city }}
