name: Nightly scraper

on:
  schedule:
    - cron: "5 22 */2 * *"   # every 2 days at 22:05 UTC (01:05 Israel summer / 00:05 Israel winter)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        city: [tel_aviv, jerusalem, haifa, beer_sheva]

    env:
      SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    defaults:
      run:
        working-directory: /Users/roeital/Documents/Rental Scout

    steps:
      - name: Pull latest code
        run: git pull

      - name: Install dependencies
        run: |
          python3 -m pip install -r scraper/requirements.txt
          python3 -m pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python3 -m playwright install chromium

      - name: Scrape ${{ matrix.city }}
        run: caffeinate -dims python3 scraper/run.py --playwright --city ${{ matrix.city }}
